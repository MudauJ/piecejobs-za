kind = "web"
previewPath = "/"
title = "PieceJobs ZA"
version = "1.0.0"
id = "artifacts/piecejobs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23741

[services.development]
run = "pnpm --filter @workspace/piecejobs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/piecejobs", "run", "build" ]
publicDir = "artifacts/piecejobs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23741"
BASE_PATH = "/"
